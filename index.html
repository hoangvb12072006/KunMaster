<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOANGKUN | SECURE OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00e676; 
            --primary-glow: rgba(0, 230, 118, 0.4);
            --bg-dark: #0a0b0e;
            --surface: rgba(20, 22, 28, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ff4757;
            --warning: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 230, 118, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 230, 118, 0.03), transparent 25%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .dashboard-container {
            width: 100%; max-width: 800px; padding: 30px 20px; z-index: 10;
        }

        .sys-title {
            text-align: center; font-size: 2.5rem; font-weight: 800;
            color: var(--text-main); margin-bottom: 40px; letter-spacing: 4px;
            min-height: 3.5rem; display: flex; justify-content: center; align-items: center;
        }
        .sys-title span { color: var(--primary); }
        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .window-header {
            background: rgba(0,0,0,0.3); padding: 12px 20px; 
            display: flex; align-items: center; border-bottom: 1px solid var(--surface-border);
        }
        .window-controls { display: flex; gap: 8px; }
        .control-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: var(--danger); }
        .dot-yellow { background: var(--warning); }
        .dot-green { background: var(--primary); }
        .window-title { margin: 0 auto; color: var(--text-muted); font-size: 0.85rem; font-family: 'Fira Code', monospace;}

        .terminal-body { 
            padding: 25px; font-size: 0.95rem; line-height: 1.7; 
            min-height: 160px; color: var(--text-muted); font-family: 'Fira Code', monospace;
        }
        .typing-line { display: flex; margin-bottom: 6px; }
        .prompt { margin-right: 12px; color: var(--primary); font-weight: 500; }
        .content { color: var(--text-main); }

        .target-config { padding: 30px; }
        .target-config h3 {
            color: var(--text-main); font-size: 1.1rem; font-weight: 600;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }
        .target-config h3::before {
            content: ''; display: inline-block; width: 8px; height: 8px; 
            background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary-glow);
        }

        .input-group { display: flex; flex-direction: column; gap: 16px; }
        .hacker-input {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--surface-border);
            color: var(--text-main); padding: 15px 20px; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; border-radius: 10px; outline: none; transition: all 0.3s ease;
        }
        .hacker-input:focus { border-color: var(--primary); background: rgba(0, 230, 118, 0.02); }
        .hacker-input::placeholder { color: #6b7280; }

        .btn-container { display: flex; justify-content: center; margin-top: 10px; }
        .btn-pro {
            background: var(--primary); color: #000; border: none; padding: 16px 40px;
            font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease; border-radius: 10px; width: 100%; max-width: 350px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-pro:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }

        /* --- MODAL CHẠY CODE --- */
        .hack-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(8px); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .hack-modal.active { opacity: 1; pointer-events: all; }
        
        .hack-box {
            width: 90%; max-width: 700px; height: 75vh; display: flex; flex-direction: column;
        }
        
        .hack-header {
            padding: 18px 25px; border-bottom: 1px solid var(--surface-border);
            color: var(--text-main); font-weight: 600; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hack-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .hack-close:hover { color: var(--text-main); }
        
        .hack-content {
            flex: 1; padding: 25px; overflow-y: auto; color: var(--text-muted);
            font-size: 0.95rem; line-height: 1.6; font-family: 'Fira Code', monospace;
        }
        .hack-content::-webkit-scrollbar { width: 4px; }
        .hack-content::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 4px; }

        .hack-footer {
            padding: 15px 25px; border-top: 1px solid var(--surface-border);
            color: var(--primary); font-size: 0.9rem; font-family: 'Fira Code', monospace; font-weight: 500;
        }

        .hl-target { color: var(--primary); font-weight: 600; text-shadow: 0 0 5px var(--primary-glow); }
        .hl-danger { color: var(--danger); font-weight: bold; }
        .hl-link { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1 class="sys-title" id="main-title"></h1>

        <div class="glass-panel">
            <div class="window-header">
                <div class="window-controls">
                    <div class="control-dot dot-red"></div>
                    <div class="control-dot dot-yellow"></div>
                    <div class="control-dot dot-green"></div>
                </div>
                <div class="window-title">system_init_v2.sh</div>
            </div>
            <div class="terminal-body" id="term-body"></div>
        </div>

        <div class="glass-panel target-config">
            <h3>Target Configuration</h3>
            <div class="input-group">
                <input type="text" id="target-link" class="hacker-input" placeholder="Nhập Link Facebook (VD: facebook.com/profile.php?id=...)">
                <input type="text" id="target-name" class="hacker-input" placeholder="Nhập Tên Mục Tiêu (VD: Ph Văn Tuấn)">
            </div>
            <div class="btn-container">
                <button class="btn-pro" onclick="startHackSequence()">RUN ANALYSIS</button>
            </div>
        </div>
    </div>

    <div id="hack-modal" class="hack-modal">
        <div class="glass-panel hack-box">
            <div class="hack-header">
                <span id="modal-title">System Execution</span>
                <button class="hack-close" onclick="closeHackModal()">✕</button>
            </div>
            
            <div class="hack-content" id="hack-logs">
                </div>

            <div class="hack-footer" id="hack-status">
                Waiting for target input... <span class="cursor-blink">_</span>
            </div>
        </div>
    </div>

    <script>
        // --- Gõ Chữ Tiêu Đề ---
        const titleText = "HOANGKUN";
        const titleEl = document.getElementById('main-title');
        let titleIdx = 0;
        function typeMainTitle() {
            if (titleIdx < titleText.length) {
                titleEl.innerHTML = titleText.substring(0, titleIdx + 1) + '<span style="color:var(--text-muted)">_</span>';
                titleIdx++;
                setTimeout(typeMainTitle, 120); 
            } else {
                titleEl.innerHTML = titleText + '<span class="cursor-blink" style="color:var(--text-muted)">_</span>';
            }
        }
        setTimeout(typeMainTitle, 200);

        // --- Terminal Chính ---
        const terminalText = [
            "<span class='content'>Establishing secure connection...</span> <span style='color:var(--primary)'>[OK]</span>",
            "<span class='content'>Loading analysis modules...</span> <span style='color:var(--primary)'>[OK]</span>",
            "<span class='content'>Bypassing regional restrictions...</span> <span style='color:var(--primary)'>[OK]</span>",
            "<span class='content'>System ready. Please configure target.</span>"
        ];
        const termBody = document.getElementById('term-body'); let lineIndex = 0;
        function typeLine() {
            if (lineIndex < terminalText.length) {
                const div = document.createElement('div'); div.className = 'typing-line';
                div.innerHTML = `<span class="prompt">~</span> <span class="content">${terminalText[lineIndex]}</span>`;
                termBody.appendChild(div); lineIndex++; setTimeout(typeLine, Math.random() * 300 + 100);
            } else {
                const inputDiv = document.createElement('div'); inputDiv.className = 'typing-line';
                inputDiv.innerHTML = `<span class="prompt">~</span> <span class="cursor-blink">_</span>`;
                termBody.appendChild(inputDiv);
            }
        }
        setTimeout(typeLine, 1200);

        // --- HỆ THỐNG CHẠY CODE HACK ---
        const hackModal = document.getElementById('hack-modal');
        const hackLogs = document.getElementById('hack-logs');
        const hackStatus = document.getElementById('hack-status');
        const modalTitle = document.getElementById('modal-title');
        let hackInterval;

        function startHackSequence() {
            let inputLink = document.getElementById('target-link').value.trim();
            let inputName = document.getElementById('target-name').value.trim();

            if (!inputLink) inputLink = "facebook.com/unknown";
            if (!inputName) inputName = "Unknown Target";

            hackModal.classList.add('active');
            hackLogs.innerHTML = ""; // Clear logs
            modalTitle.innerText = `Process: Data Extraction`;
            hackStatus.innerHTML = `> Analyzing route: ${inputLink} <span class="cursor-blink">_</span>`;

            // Mảng các câu lệnh ngầu lòi
            const dynamicLogs = [
                `[INIT] Connecting to API endpoints...`,
                `[INFO] Resolving URL: ${inputLink}... <span style='color:var(--primary)'>[OK]</span>`,
                `[SYS] Parsing DOM elements for user ID...`,
                `[MATCH] Profile located: <span class='hl-target'>[${inputName.toUpperCase()}]</span>`,
                `[EXEC] Injecting query parameters to bypass 2FA...`,
                `[WARN] Firewall detected. Evading security layers... <span style='color:var(--primary)'>[SUCCESS]</span>`,
                `[DATA] Extracting basic profile schema...`,
                `[DATA] Compiling connection history & location data...`,
                `[SYS] Resolving IP footprint via Darknet nodes...`,
                `[HASH] Decrypting database keys...`,
                `[EXTRACT] Dumping private message threads... <span class='hl-danger'>[LOCKED]</span>`,
                `[BRUTE] Running dictionary attack on message vault...`,
                `[SUCCESS] Vault breached. Downloading tables...`,
                `[SYS] Covering tracks and wiping connection logs...`,
                `[FINISH] Operations completed.`
            ];

            let lineCount = 0;
            let logIndex = 0;
            
            hackInterval = setInterval(() => {
                const p = document.createElement('div');
                
                // Random in ra Text hoặc in ra mã HEX để màn hình chạy cho dài
                if (logIndex < dynamicLogs.length && Math.random() > 0.4) {
                    p.innerHTML = dynamicLogs[logIndex];
                    logIndex++;
                } else {
                    let hexDump = '';
                    for(let i=0; i<10; i++) hexDump += Math.floor(Math.random()*16).toString(16).padStart(2, '0').toUpperCase() + ' ';
                    p.innerText = `> 0x${Math.floor(Math.random()*9999).toString(16).toUpperCase()} ${hexDump}`;
                    p.style.opacity = "0.5";
                }
                
                hackLogs.appendChild(p);
                hackLogs.scrollTop = hackLogs.scrollHeight;
                lineCount++;

                // Đổi trạng thái status 
                if (lineCount === 30) {
                    hackStatus.innerHTML = `> Extracting payload for <span class="hl-target">${inputName}</span> <span class="cursor-blink">_</span>`;
                }

                // Dừng lại sau khi chạy 80 dòng code
                if (lineCount > 80) {
                    clearInterval(hackInterval);
                    
                    // In ra bảng thông báo hoàn tất ngay trong Terminal
                    const successMsg = document.createElement('div');
                    successMsg.innerHTML = `
                        <br>
                        <span style='color:var(--primary); font-weight: 600; font-size: 1.05rem;'>
                        ======================================================<br>
                        [+] TARGET COMPROMISED: ${inputName.toUpperCase()}<br>
                        [+] TARGET URL: ${inputLink}<br>
                        [+] DATA EXTRACTION: 100% DONE.<br>
                        [+] FILES SAVED TO LOCAL SYSTEM.<br>
                        ======================================================
                        </span><br><br>`;
                    
                    hackLogs.appendChild(successMsg);
                    hackLogs.scrollTop = hackLogs.scrollHeight;

                    // Chốt trạng thái
                    hackStatus.innerHTML = `> Operation completed successfully. <span class="cursor-blink">_</span>`;
                }
            }, 60); // Tốc độ chạy 60ms / dòng
        }

        function closeHackModal() {
            hackModal.classList.remove('active');
            clearInterval(hackInterval);
        }
    </script>
</body>
</html>
