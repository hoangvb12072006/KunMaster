<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOANGKUN | SECURE TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Orbitron:wght@500;700&display=swap');

        :root {
            --primary: #00ff41;
            --bg-base: #050505;
            --bg-panel: #0a0a0c;
            --border-color: #1f2322;
            --text-dim: #777;
            --text-light: #e0e0e0;
            --danger: #ff3333;
            --warning: #ffbd2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--primary);
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; opacity: 0.2; }

        .dashboard-container {
            width: 100%; max-width: 900px; padding: 20px; z-index: 10;
        }

        .sys-title {
            text-align: center; font-family: 'Orbitron', sans-serif; font-size: 3rem;
            color: var(--text-light); margin-bottom: 40px; letter-spacing: 8px; font-weight: 700;
            min-height: 3.5rem; 
        }
        .sys-title span { color: var(--primary); }

        .terminal-window {
            background: rgba(10, 10, 12, 0.85); border: 1px solid var(--border-color); border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(5px); margin-bottom: 30px;
        }

        .window-header {
            background: #111; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color);
        }

        .window-controls { display: flex; gap: 8px; }
        .control-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: var(--danger); }
        .dot-yellow { background: var(--warning); }
        .dot-green { background: var(--primary); }
        .window-title { margin: 0 auto; color: var(--text-dim); font-size: 0.9rem; letter-spacing: 1px; }

        .terminal-body { padding: 25px; font-size: 1.05rem; line-height: 1.6; min-height: 180px; color: var(--text-light); }
        .typing-line { display: flex; margin-bottom: 8px; }
        .prompt { margin-right: 12px; color: var(--primary); font-weight: 600; }

        .target-config {
            background: rgba(15, 15, 18, 0.6); border: 1px solid var(--border-color); 
            padding: 25px; border-radius: 6px; margin-bottom: 30px;
        }
        
        .target-config h3 {
            color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 1.1rem; 
            margin-bottom: 15px; letter-spacing: 1px;
        }

        .input-group { display: flex; flex-direction: column; gap: 15px; }

        .hacker-input {
            width: 100%; background: #050505; border: 1px solid var(--border-color);
            color: var(--primary); padding: 12px 15px; font-family: 'Fira Code', monospace;
            font-size: 1rem; border-radius: 4px; outline: none; transition: 0.3s;
        }

        .hacker-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .hacker-input::placeholder { color: #444; }

        .btn-container { display: flex; justify-content: center; gap: 20px; }
        .btn-pro {
            background: transparent; color: var(--text-light); border: 1px solid var(--border-color); padding: 15px 40px;
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; border-radius: 3px; width: 100%; max-width: 400px;
        }
        .btn-pro:hover { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); }

        .cursor-blink { animation: blink 0.8s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- MODAL --- */
        .hack-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s ease;
        }
        .hack-modal.active { opacity: 1; pointer-events: all; }
        
        .hack-box {
            width: 90%; max-width: 800px; height: 75vh;
            background: #000; border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            display: flex; flex-direction: column; border-radius: 4px; position: relative;
        }
        
        .hack-header {
            padding: 15px; border-bottom: 1px solid #333;
            color: var(--danger); font-weight: bold; font-size: 1.1rem;
            display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif;
        }
        .hack-close { background: none; border: none; color: #555; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .hack-close:hover { color: #fff; }
        
        .hack-content {
            flex: 1; padding: 15px; overflow-y: auto; color: var(--primary);
            font-size: 0.95rem; line-height: 1.4; position: relative;
        }
        .hack-content::-webkit-scrollbar { width: 5px; }
        .hack-content::-webkit-scrollbar-thumb { background: #333; }

        .hack-footer {
            padding: 15px; border-top: 1px solid #333;
            color: var(--warning); font-size: 1rem; text-align: center; font-weight: bold; font-family: 'Orbitron', sans-serif;
        }
        
        .hl-target { color: var(--warning); font-weight: 600; }
        .hl-danger { color: var(--danger); }
        .hl-link { color: #00d4ff; text-decoration: underline; }

        /* --- FAKE PROFILE CARD --- */
        #profile-card {
            display: none; /* Ẩn lúc đang chạy code */
            flex-direction: column; align-items: center; justify-content: center;
            height: 100%; animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .profile-name {
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--primary);
            text-shadow: 0 0 10px var(--primary); margin-bottom: 5px; text-transform: uppercase;
        }

        .profile-status { color: var(--danger); font-weight: bold; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.1rem;}

        .info-grid {
            display: grid; grid-template-columns: 1fr 2fr; gap: 15px; width: 100%; max-width: 600px;
            background: rgba(20, 20, 20, 0.8); padding: 25px; border: 1px dashed #444; border-radius: 5px;
        }
        
        .info-label { color: var(--text-dim); text-align: right; padding-right: 10px; font-weight: bold; }
        .info-value { color: var(--text-light); }
        .val-red { color: var(--danger); font-weight: bold; }
        .val-yellow { color: var(--warning); }
        .val-blue { color: #00d4ff; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="dashboard-container">
        <h1 class="sys-title" id="main-title"></h1>

        <div class="terminal-window">
            <div class="window-header">
                <div class="window-controls">
                    <div class="control-dot dot-red"></div>
                    <div class="control-dot dot-yellow"></div>
                    <div class="control-dot dot-green"></div>
                </div>
                <div class="window-title">root@hoangkun-server:~</div>
            </div>
            <div class="terminal-body" id="term-body"></div>
        </div>

        <div class="target-config">
            <h3>[ TARGET CONFIGURATION ]</h3>
            <div class="input-group">
                <input type="text" id="target-link" class="hacker-input" placeholder="Nhập Link Facebook (VD: facebook.com/profile.php?id=...)">
                <input type="text" id="target-name" class="hacker-input" placeholder="Nhập Tên Mục Tiêu (VD: Ph Văn Tuấn)">
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-pro" onclick="startHackSequence()">CHECK FB</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="hack-modal" class="hack-modal">
        <div class="hack-box">
            <div class="hack-header">
                <span id="modal-title">[!] EXECUTING PROTOCOL</span>
                <button class="hack-close" onclick="closeHackModal()">[ X ]</button>
            </div>
            
            <div class="hack-content" id="hack-content-area">
                <!-- KHU VỰC 1: CODE CHẠY -->
                <div id="hack-logs"></div>

                <!-- KHU VỰC 2: HỒ SƠ GIẢ LẬP KHÔNG ẢNH ĐẠI DIỆN -->
                <div id="profile-card">
                    <div class="profile-name" id="p-name">UNKNOWN</div>
                    <div class="profile-status">[ FACEBOOK DATA EXTRACTED ]</div>
                    
                    <div class="info-grid">
                        <div class="info-label">URL_ID:</div>
                        <div class="info-value" id="p-url">...</div>
                        
                        <div class="info-label">WORKPLACE:</div>
                        <div class="info-value val-blue" id="p-work">...</div>

                        <div class="info-label">EDUCATION:</div>
                        <div class="info-value val-blue" id="p-edu">...</div>

                        <div class="info-label">RELATIONSHIP:</div>
                        <div class="info-value val-blue" id="p-rel">...</div>

                        <div class="info-label">IP_ADDRESS:</div>
                        <div class="info-value val-red" id="p-ip">...</div>
                        
                        <div class="info-label">LOCATION:</div>
                        <div class="info-value val-yellow" id="p-loc">...</div>
                        
                        <div class="info-label">DEVICE_INFO:</div>
                        <div class="info-value" id="p-device">...</div>
                        
                        <div class="info-label">LAST_ACTIVE:</div>
                        <div class="info-value">Online Now (Tracking...)</div>
                    </div>
                </div>
            </div>

            <div class="hack-footer" id="hack-status">
                INITIALIZING ENVIRONMENT... <span class="cursor-blink">_</span>
            </div>
        </div>
    </div>

    <script>
        // --- Hiệu Ứng Gõ Chữ Tiêu Đề ---
        const titleText = "HOANGKUN";
        const titleEl = document.getElementById('main-title');
        let titleIdx = 0;
        function typeMainTitle() {
            if (titleIdx < titleText.length) {
                titleEl.innerHTML = titleText.substring(0, titleIdx + 1) + '<span>_</span>';
                titleIdx++;
                setTimeout(typeMainTitle, 150); 
            } else {
                titleEl.innerHTML = titleText + '<span class="cursor-blink">_</span>';
            }
        }
        setTimeout(typeMainTitle, 300);

        // --- Matrix Nền ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const chars = '01'.split(''); 
        const fontSize = 14; const columns = canvas.width / fontSize; const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;
        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- Terminal Chính ---
        const terminalText = [
            "<span>Booting HoangKun Core OS v3.2.1...</span> <span style='color:#00ff41'>[OK]</span>",
            "<span>Loading exploit payloads...</span> <span style='color:#00ff41'>[OK]</span>",
            "<span>Mounting secure file systems...</span> <span style='color:#00ff41'>[OK]</span>",
            "<span>Awaiting target configuration...</span> <span style='color:#ffbd2e'>[STANDBY]</span>"
        ];
        const termBody = document.getElementById('term-body'); let lineIndex = 0;
        function typeLine() {
            if (lineIndex < terminalText.length) {
                const div = document.createElement('div'); div.className = 'typing-line';
                div.innerHTML = `<span class="prompt">root@system:~$</span> <span class="content">${terminalText[lineIndex]}</span>`;
                termBody.appendChild(div); lineIndex++; setTimeout(typeLine, Math.random() * 400 + 200);
            } else {
                const inputDiv = document.createElement('div'); inputDiv.className = 'typing-line';
                inputDiv.innerHTML = `<span class="prompt">root@system:~$</span> <span class="cursor-blink">_</span>`;
                termBody.appendChild(inputDiv);
            }
        }
        setTimeout(typeLine, 1500);

        // --- Dữ liệu Fake Random ---
        const fakeIPs = ["113.190.x.x", "14.226.x.x", "42.112.x.x", "171.224.x.x", "116.108.x.x"];
        const fakeDevices = ["iPhone 14 Pro Max (iOS 17)", "Samsung Galaxy S23 Ultra", "Windows 11 PC (Chrome)", "MacBook Pro M2 (Safari)", "Xiaomi 13 Pro (Android 14)"];
        const fakeLocations = ["Hà Nội, VN (Proxy Detour)", "Hải Phòng, VN (Encrypted Node)", "Hồ Chí Minh, VN (VPN Active)", "Đà Nẵng, VN (Triangulated)"];
        const fakeWorkplaces = ["Freelancer", "Tự do", "Giám đốc tại Công ty TNHH MTV", "Ẩn bởi người dùng", "Học viện Hàng Không"];
        const fakeEducations = ["Đại học Bách Khoa", "THPT Chuyên", "Đại học Kinh Tế Quốc Dân", "Trường Đời", "Ẩn bởi người dùng"];
        const fakeRelationships = ["Độc thân", "Đang hẹn hò", "Đã kết hôn", "Rất phức tạp", "Ẩn bởi người dùng"];

        // --- SCRIPT HACK MODAL ĐỘNG ---
        const hackModal = document.getElementById('hack-modal');
        const hackLogs = document.getElementById('hack-logs');
        const profileCard = document.getElementById('profile-card');
        const hackStatus = document.getElementById('hack-status');
        const modalTitle = document.getElementById('modal-title');
        let hackInterval;

        function startHackSequence() {
            let inputLink = document.getElementById('target-link').value.trim();
            let inputName = document.getElementById('target-name').value.trim();

            if (!inputLink) inputLink = "facebook.com/profile.php?id=1000...";
            if (!inputName) inputName = "ẨN DANH";

            // Reset UI states
            hackModal.classList.add('active');
            hackLogs.style.display = 'block';
            profileCard.style.display = 'none';
            hackLogs.innerHTML = "";
            modalTitle.innerText = `[!] TARGET LOCKED: ${inputName.toUpperCase()}`;
            hackStatus.innerHTML = `SCANNING URL: <span class="hl-link">${inputLink}</span> <span class="cursor-blink">_</span>`;

            const dynamicLogs = [
                `Connecting to Meta Graph API servers...`,
                `Resolving URL route: <span class='hl-link'>${inputLink}</span>... <span style='color:#00ff41'>[200 OK]</span>`,
                `Parsing HTML DOM to locate UID...`,
                `Target Identified! Matching profile name: <span class='hl-target'>[ ${inputName} ]</span>`,
                `Injecting payload into session memory of <span class='hl-target'>${inputName}</span>...`,
                `Intercepting 2FA Authentication request... <span style='color:#00ff41'>[BYPASSED]</span>`,
                `Bypassing Data Encryption... <span class='hl-danger'>[FB PROFILE LOCKED]</span>`,
                `Applying Decryption Matrix to Profile Data...`,
                `Extracting private message database of <span class='hl-target'>${inputName}</span>...`,
                `Memory block resolved at 0x00F9A4C...`,
                `Compiling user data packets [||||||||||||||||||] 100%`,
                `Routing through darknet proxy nodes... <span style='color:#00ff41'>[OK]</span>`,
                `Decrypting RSA-4096 User Hash for <span class='hl-target'>${inputName}</span>...`,
                `Establishing Reverse Shell to target device...`,
                `Privilege escalation successful. Root access granted.`
            ];

            let lineCount = 0;
            let logIndex = 0;
            
            hackInterval = setInterval(() => {
                const p = document.createElement('div');
                
                if (logIndex < dynamicLogs.length && Math.random() > 0.4) {
                    p.innerHTML = dynamicLogs[logIndex];
                    logIndex++;
                } else {
                    let hexDump = '';
                    for(let i=0; i<14; i++) hexDump += Math.floor(Math.random()*16).toString(16).padStart(2, '0').toUpperCase() + ' ';
                    p.innerText = `[HEX] ${hexDump}`;
                    p.style.opacity = "0.5";
                }
                
                hackLogs.appendChild(p);
                hackLogs.scrollTop = hackLogs.scrollHeight;
                lineCount++;

                if (lineCount === 30) {
                    hackStatus.innerHTML = `EXTRACTING DATA FROM: <span class="hl-target">${inputName.toUpperCase()}</span> <span class="cursor-blink">_</span>`;
                }

                if (lineCount > 70) {
                    clearInterval(hackInterval);
                    
                    // Ẩn bảng log, hiện bảng profile
                    hackLogs.style.display = 'none';
                    profileCard.style.display = 'flex';

                    // Cập nhật dữ liệu fake vào bảng
                    document.getElementById('p-name').innerText = inputName;
                    document.getElementById('p-url').innerText = inputLink.substring(0, 30) + (inputLink.length > 30 ? '...' : '');
                    document.getElementById('p-work').innerText = fakeWorkplaces[Math.floor(Math.random() * fakeWorkplaces.length)];
                    document.getElementById('p-edu').innerText = fakeEducations[Math.floor(Math.random() * fakeEducations.length)];
                    document.getElementById('p-rel').innerText = fakeRelationships[Math.floor(Math.random() * fakeRelationships.length)];
                    document.getElementById('p-ip').innerText = fakeIPs[Math.floor(Math.random() * fakeIPs.length)];
                    document.getElementById('p-loc').innerText = fakeLocations[Math.floor(Math.random() * fakeLocations.length)];
                    document.getElementById('p-device').innerText = fakeDevices[Math.floor(Math.random() * fakeDevices.length)];

                    hackStatus.innerHTML = `<span style="color: #00ff41;">[+] PROFILE DATA EXTRACTED & RENDERED [+]</span>`;
                }
            }, 60); 
        }

        function closeHackModal() {
            hackModal.classList.remove('active');
            clearInterval(hackInterval);
        }
    </script>
</body>
</html>
