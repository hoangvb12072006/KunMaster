<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOANGKUN | SECURE OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00e676; /* Xanh ngọc hiện đại */
            --primary-glow: rgba(0, 230, 118, 0.4);
            --bg-dark: #0a0b0e;
            --surface: rgba(20, 22, 28, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ff4757;
            --warning: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 230, 118, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 230, 118, 0.03), transparent 25%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .dashboard-container {
            width: 100%; max-width: 800px; padding: 30px 20px; z-index: 10;
        }

        /* Tiêu đề gọn gàng */
        .sys-title {
            text-align: center; font-size: 2.5rem; font-weight: 800;
            color: var(--text-main); margin-bottom: 40px; letter-spacing: 4px;
            min-height: 3.5rem; display: flex; justify-content: center; align-items: center;
        }
        .sys-title span { color: var(--primary); }
        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Kính mờ (Glassmorphism) chung cho các khối */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            overflow: hidden;
        }

        /* Terminal Window */
        .window-header {
            background: rgba(0,0,0,0.3); padding: 12px 20px; 
            display: flex; align-items: center; border-bottom: 1px solid var(--surface-border);
        }
        .window-controls { display: flex; gap: 8px; }
        .control-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: var(--danger); }
        .dot-yellow { background: var(--warning); }
        .dot-green { background: var(--primary); }
        .window-title { margin: 0 auto; color: var(--text-muted); font-size: 0.85rem; font-family: 'Fira Code', monospace;}

        .terminal-body { 
            padding: 25px; font-size: 0.95rem; line-height: 1.7; 
            min-height: 160px; color: var(--text-muted); font-family: 'Fira Code', monospace;
        }
        .typing-line { display: flex; margin-bottom: 6px; }
        .prompt { margin-right: 12px; color: var(--primary); font-weight: 500; }
        .content { color: var(--text-main); }

        /* Form nhập liệu */
        .target-config { padding: 30px; }
        .target-config h3 {
            color: var(--text-main); font-size: 1.1rem; font-weight: 600;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }
        .target-config h3::before {
            content: ''; display: inline-block; width: 8px; height: 8px; 
            background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary-glow);
        }

        .input-group { display: flex; flex-direction: column; gap: 16px; }
        .hacker-input {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--surface-border);
            color: var(--text-main); padding: 15px 20px; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; border-radius: 10px; outline: none; transition: all 0.3s ease;
        }
        .hacker-input:focus { border-color: var(--primary); background: rgba(0, 230, 118, 0.02); }
        .hacker-input::placeholder { color: #6b7280; }

        /* Nút bấm hiện đại */
        .btn-container { display: flex; justify-content: center; margin-top: 10px; }
        .btn-pro {
            background: var(--primary); color: #000; border: none; padding: 16px 40px;
            font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease; border-radius: 10px; width: 100%; max-width: 350px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-pro:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }

        /* --- MODAL HIỆN ĐẠI --- */
        .hack-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(8px); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .hack-modal.active { opacity: 1; pointer-events: all; }
        
        .hack-box {
            width: 90%; max-width: 650px; height: 70vh; display: flex; flex-direction: column;
        }
        
        .hack-header {
            padding: 18px 25px; border-bottom: 1px solid var(--surface-border);
            color: var(--text-main); font-weight: 600; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hack-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .hack-close:hover { color: var(--text-main); }
        
        .hack-content {
            flex: 1; padding: 25px; overflow-y: auto; color: var(--text-muted);
            font-size: 0.9rem; line-height: 1.6; font-family: 'Fira Code', monospace;
        }
        .hack-content::-webkit-scrollbar { width: 4px; }
        .hack-content::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 4px; }

        .hack-footer {
            padding: 15px 25px; border-top: 1px solid var(--surface-border);
            color: var(--primary); font-size: 0.9rem; font-family: 'Fira Code', monospace; font-weight: 500;
        }

        .hl-target { color: var(--primary); font-weight: 600; }
        .hl-danger { color: var(--danger); }
        .hl-link { color: #3b82f6; text-decoration: none; }

        /* --- BẢNG PROFILE GỌN GÀNG TỪNG CHI TIẾT --- */
        #profile-card {
            display: none; flex-direction: column; height: 100%; animation: fadeIn 0.8s ease; font-family: 'Inter', sans-serif;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profile-header {
            text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--surface-border);
        }
        .profile-name { font-size: 1.8rem; color: var(--text-main); font-weight: 800; margin-bottom: 8px; }
        .profile-status { color: var(--primary); font-size: 0.85rem; font-weight: 500; letter-spacing: 1px; }

        .info-grid {
            display: flex; flex-direction: column; gap: 12px; width: 100%;
        }
        .info-row {
            display: flex; justify-content: space-between; padding: 12px 15px;
            background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid transparent;
            transition: 0.2s;
        }
        .info-row:hover { border-color: var(--surface-border); background: rgba(255,255,255,0.04); }
        
        .info-label { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;}
        .info-value { color: var(--text-main); font-size: 0.95rem; font-weight: 500; text-align: right; }
        
        .val-highlight { color: var(--primary); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1 class="sys-title" id="main-title"></h1>

        <div class="glass-panel">
            <div class="window-header">
                <div class="window-controls">
                    <div class="control-dot dot-red"></div>
                    <div class="control-dot dot-yellow"></div>
                    <div class="control-dot dot-green"></div>
                </div>
                <div class="window-title">system_init_v2.sh</div>
            </div>
            <div class="terminal-body" id="term-body"></div>
        </div>

        <div class="glass-panel target-config">
            <h3>Target Configuration</h3>
            <div class="input-group">
                <input type="text" id="target-link" class="hacker-input" placeholder="Nhập Link Facebook (VD: facebook.com/profile.php?id=...)">
                <input type="text" id="target-name" class="hacker-input" placeholder="Nhập Tên Mục Tiêu (VD: Ph Văn Tuấn)">
            </div>
            <div class="btn-container">
                <button class="btn-pro" onclick="startHackSequence()">RUN ANALYSIS</button>
            </div>
        </div>
    </div>

    <div id="hack-modal" class="hack-modal">
        <div class="glass-panel hack-box">
            <div class="hack-header">
                <span id="modal-title">System Execution</span>
                <button class="hack-close" onclick="closeHackModal()">✕</button>
            </div>
            
            <div class="hack-content" id="hack-content-area">
                <div id="hack-logs"></div>

                <div id="profile-card">
                    <div class="profile-header">
                        <div class="profile-name" id="p-name">UNKNOWN</div>
                        <div class="profile-status">✓ DATA SUCCESSFULLY EXTRACTED</div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-row">
                            <span class="info-label">Target URL</span>
                            <span class="info-value hl-link" id="p-url">...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Workplace</span>
                            <span class="info-value" id="p-work">...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Education</span>
                            <span class="info-value" id="p-edu">...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Relationship</span>
                            <span class="info-value" id="p-rel">...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">IP Address</span>
                            <span class="info-value val-highlight" id="p-ip">...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Location</span>
                            <span class="info-value" id="p-loc">...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Device Info</span>
                            <span class="info-value" id="p-device">...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hack-footer" id="hack-status">
                Waiting for target input... <span class="cursor-blink">_</span>
            </div>
        </div>
    </div>

    <script>
        // --- Gõ Chữ Tiêu Đề ---
        const titleText = "HOANGKUN";
        const titleEl = document.getElementById('main-title');
        let titleIdx = 0;
        function typeMainTitle() {
            if (titleIdx < titleText.length) {
                titleEl.innerHTML = titleText.substring(0, titleIdx + 1) + '<span style="color:var(--text-muted)">_</span>';
                titleIdx++;
                setTimeout(typeMainTitle, 120); 
            } else {
                titleEl.innerHTML = titleText + '<span class="cursor-blink" style="color:var(--text-muted)">_</span>';
            }
        }
        setTimeout(typeMainTitle, 200);

        // --- Terminal Chính ---
        const terminalText = [
            "<span class='content'>Establishing secure connection...</span> <span style='color:var(--primary)'>[OK]</span>",
            "<span class='content'>Loading analysis modules...</span> <span style='color:var(--primary)'>[OK]</span>",
            "<span class='content'>Bypassing regional restrictions...</span> <span style='color:var(--primary)'>[OK]</span>",
            "<span class='content'>System ready. Please configure target.</span>"
        ];
        const termBody = document.getElementById('term-body'); let lineIndex = 0;
        function typeLine() {
            if (lineIndex < terminalText.length) {
                const div = document.createElement('div'); div.className = 'typing-line';
                div.innerHTML = `<span class="prompt">~</span> <span class="content">${terminalText[lineIndex]}</span>`;
                termBody.appendChild(div); lineIndex++; setTimeout(typeLine, Math.random() * 300 + 100);
            } else {
                const inputDiv = document.createElement('div'); inputDiv.className = 'typing-line';
                inputDiv.innerHTML = `<span class="prompt">~</span> <span class="cursor-blink">_</span>`;
                termBody.appendChild(inputDiv);
            }
        }
        setTimeout(typeLine, 1200);

        // --- CƠ SỞ DỮ LIỆU CỐ ĐỊNH CHUẨN XÁC ---
        const realTargetData = {
            "ph văn tuấn": {
                workplace: "Tự do",
                education: "Ẩn bởi người dùng",
                relationship: "Độc thân",
                ip: "103.11.24.88",
                location: "Hải Phòng, Việt Nam",
                device: "iPhone 14 Pro Max"
            },
            "nguyễn việt hoàng": {
                workplace: "HOANGKUN STORE",
                education: "Cao đẳng Công nghệ Hải Phòng",
                relationship: "Đã kết hôn",
                ip: "113.190.42.12",
                location: "Hải Phòng, Việt Nam",
                device: "Windows 11 PC"
            }
        };

        // --- Dữ liệu bốc bừa ---
        const fakeIPs = ["113.190.x.x", "14.226.x.x", "42.112.x.x", "171.224.x.x"];
        const fakeDevices = ["Samsung Galaxy S23", "Windows 11 PC", "MacBook Pro M2", "Xiaomi 13 Pro"];
        const fakeLocations = ["Hà Nội, VN", "Đà Nẵng, VN", "Hồ Chí Minh, VN"];
        const fakeWorkplaces = ["Freelancer", "Ẩn bởi người dùng", "Học viện Ngân Hàng"];
        const fakeEducations = ["Đại học Bách Khoa", "THPT Chuyên", "Ẩn bởi người dùng"];
        const fakeRelationships = ["Đang hẹn hò", "Rất phức tạp", "Ẩn bởi người dùng"];

        const hackModal = document.getElementById('hack-modal');
        const hackLogs = document.getElementById('hack-logs');
        const profileCard = document.getElementById('profile-card');
        const hackStatus = document.getElementById('hack-status');
        const modalTitle = document.getElementById('modal-title');
        let hackInterval;

        function startHackSequence() {
            let inputLink = document.getElementById('target-link').value.trim();
            let inputName = document.getElementById('target-name').value.trim();

            if (!inputLink) inputLink = "facebook.com/unknown";
            if (!inputName) inputName = "Unknown Target";

            hackModal.classList.add('active');
            hackLogs.style.display = 'block';
            profileCard.style.display = 'none';
            hackLogs.innerHTML = "";
            modalTitle.innerText = `Process: Data Extraction`;
            hackStatus.innerHTML = `> Analyzing route: ${inputLink} <span class="cursor-blink">_</span>`;

            const dynamicLogs = [
                `[INIT] Connecting to API endpoints...`,
                `[INFO] Resolving URL: ${inputLink}... <span style='color:var(--primary)'>[OK]</span>`,
                `[SYS] Parsing DOM elements for user ID...`,
                `[MATCH] Profile located: <span class='hl-target'>${inputName}</span>`,
                `[EXEC] Injecting query parameters...`,
                `[WARN] Firewall detected. Bypassing security layers... <span style='color:var(--primary)'>[SUCCESS]</span>`,
                `[DATA] Extracting basic profile schema...`,
                `[DATA] Compiling connection history & location data...`,
                `[SYS] Resolving IP footprint...`,
                `[FINISH] Decryption complete. Formatting output.`
            ];

            let lineCount = 0;
            let logIndex = 0;
            
            hackInterval = setInterval(() => {
                const p = document.createElement('div');
                
                if (logIndex < dynamicLogs.length && Math.random() > 0.3) {
                    p.innerHTML = dynamicLogs[logIndex];
                    logIndex++;
                } else {
                    let hexDump = '';
                    for(let i=0; i<8; i++) hexDump += Math.floor(Math.random()*16).toString(16).padStart(2, '0').toUpperCase() + ' ';
                    p.innerText = `> ${hexDump}`;
                    p.style.opacity = "0.4";
                }
                
                hackLogs.appendChild(p);
                hackLogs.scrollTop = hackLogs.scrollHeight;
                lineCount++;

                if (lineCount === 20) {
                    hackStatus.innerHTML = `> Extracting payload for <span class="hl-target">${inputName}</span> <span class="cursor-blink">_</span>`;
                }

                if (lineCount > 45) {
                    clearInterval(hackInterval);
                    
                    hackLogs.style.display = 'none';
                    profileCard.style.display = 'flex';

                    let targetKey = inputName.toLowerCase();
                    
                    document.getElementById('p-name').innerText = inputName;
                    document.getElementById('p-url').innerText = inputLink.substring(0, 35) + (inputLink.length > 35 ? '...' : '');

                    if (realTargetData[targetKey]) {
                        document.getElementById('p-work').innerText = realTargetData[targetKey].workplace;
                        document.getElementById('p-edu').innerText = realTargetData[targetKey].education;
                        document.getElementById('p-rel').innerText = realTargetData[targetKey].relationship;
                        document.getElementById('p-ip').innerText = realTargetData[targetKey].ip;
                        document.getElementById('p-loc').innerText = realTargetData[targetKey].location;
                        document.getElementById('p-device').innerText = realTargetData[targetKey].device;
                    } else {
                        document.getElementById('p-work').innerText = fakeWorkplaces[Math.floor(Math.random() * fakeWorkplaces.length)];
                        document.getElementById('p-edu').innerText = fakeEducations[Math.floor(Math.random() * fakeEducations.length)];
                        document.getElementById('p-rel').innerText = fakeRelationships[Math.floor(Math.random() * fakeRelationships.length)];
                        document.getElementById('p-ip').innerText = fakeIPs[Math.floor(Math.random() * fakeIPs.length)];
                        document.getElementById('p-loc').innerText = fakeLocations[Math.floor(Math.random() * fakeLocations.length)];
                        document.getElementById('p-device').innerText = fakeDevices[Math.floor(Math.random() * fakeDevices.length)];
                    }

                    hackStatus.innerHTML = `> Operation completed successfully. <span class="cursor-blink">_</span>`;
                }
            }, 50); 
        }

        function closeHackModal() {
            hackModal.classList.remove('active');
            clearInterval(hackInterval);
        }
    </script>
</body>
</html>
